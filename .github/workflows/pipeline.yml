name: infra-bootstrap

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-bootstrap-main
  cancel-in-progress: false

jobs:
  deploy-base-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init -input=false
      - name: Terraform apply (idempotent)
        working-directory: infra/terraform
        run: |
          set -euo pipefail
          plan_log="$(mktemp)"
          apply_log="$(mktemp)"

          set +e
          terraform plan -out tfplan -input=false 2> >(tee "$plan_log" >&2)
          plan_exit=$?
          set -e

          if [[ $plan_exit -ne 0 ]]; then
            if grep -q "Kubernetes cluster unreachable" "$plan_log" && terraform state list | grep -qx "helm_release.argocd"; then
              echo "Detected stale helm_release.argocd in state while cluster is unreachable. Removing from state and retrying plan..."
              terraform state rm helm_release.argocd
              terraform plan -out tfplan -input=false
            else
              echo "Terraform plan failed and no known auto-recovery rule matched."
              exit "$plan_exit"
            fi
          fi

          set +e
          terraform apply -auto-approve tfplan 2> >(tee "$apply_log" >&2)
          apply_exit=$?
          set -e

          if [[ $apply_exit -ne 0 ]]; then
            if grep -q "cannot re-use a name that is still in use" "$apply_log"; then
              echo "Detected existing Helm release 'argocd' outside Terraform state. Importing and retrying..."
              terraform import helm_release.argocd argocd/argocd
              terraform plan -out tfplan -input=false
              terraform apply -auto-approve tfplan
            else
              echo "Terraform apply failed and no known auto-recovery rule matched."
              exit "$apply_exit"
            fi
          fi

          rm -f "$plan_log"
          rm -f "$apply_log"
      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
      - name: Validate Argo CD deployment status
        run: |
          kubectl rollout status deployment/argocd-server -n argocd --timeout=300s
      - name: Validate Argo CD service is internal
        run: |
          service_type="$(kubectl -n argocd get svc argocd-server -o jsonpath='{.spec.type}')"
          test "$service_type" = "ClusterIP"
      - name: Validate Argo CD health via kubectl tunnel
        run: |
          set -euo pipefail
          kubectl -n argocd port-forward svc/argocd-server 8080:443 >/tmp/argocd-port-forward.log 2>&1 &
          pf_pid=$!
          trap 'kill "$pf_pid" >/dev/null 2>&1 || true' EXIT

          for i in {1..30}; do
            if curl --fail --silent --show-error --insecure https://127.0.0.1:8080/healthz >/dev/null; then
              echo "Argo CD is reachable at https://localhost:8080 via kubectl tunnel"
              exit 0
            fi
            sleep 2
          done

          echo "Argo CD did not answer on local tunnel" >&2
          cat /tmp/argocd-port-forward.log >&2 || true
          exit 1
