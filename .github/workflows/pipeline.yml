name: infra-bootstrap

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-bootstrap-main
  cancel-in-progress: false

jobs:
  deploy-base-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Get OIDC Token
        id: get-oidc-token
        run: |
          TOKEN=$(curl -s -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r '.value')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
      - name: Terraform init
        working-directory: infra/terraform
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_OIDC_TOKEN: ${{ steps.get-oidc-token.outputs.token }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ secrets.TF_BACKEND_KEY }}" \
            -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -backend-config="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -backend-config="use_oidc=true"
      - name: Terraform apply (idempotent)
        working-directory: infra/terraform
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_OIDC_TOKEN: ${{ steps.get-oidc-token.outputs.token }}
        run: |
          set -euo pipefail
          plan_log="$(mktemp)"
          apply_log="$(mktemp)"

          set +e
          terraform plan -out tfplan -input=false 2> >(tee "$plan_log" >&2)
          plan_exit=$?
          set -e

          if [[ $plan_exit -ne 0 ]]; then
            if grep -q "Kubernetes cluster unreachable" "$plan_log" && terraform state list | grep -qx "module.argocd.helm_release.argocd"; then
              echo "Detected stale helm_release.argocd in state while cluster is unreachable. Removing from state and retrying plan..."
              terraform state rm module.argocd.helm_release.argocd
              terraform plan -out tfplan -input=false
            else
              echo "Terraform plan failed and no known auto-recovery rule matched."
              exit "$plan_exit"
            fi
          fi

          set +e
          terraform apply -auto-approve tfplan 2> >(tee "$apply_log" >&2)
          apply_exit=$?
          set -e

          if [[ $apply_exit -ne 0 ]]; then
            if grep -q "module.cluster.azurerm_resource_group.main" "$apply_log" && grep -q "already exists - to be managed via Terraform this resource needs to be imported into the State" "$apply_log"; then
              echo "Detected existing Azure Resource Group outside Terraform state. Importing and retrying..."
              terraform import module.cluster.azurerm_resource_group.main "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.AKS_RESOURCE_GROUP }}"
              terraform plan -out tfplan -input=false
              terraform apply -auto-approve tfplan
            elif grep -q "cannot re-use a name that is still in use" "$apply_log"; then
              echo "Detected existing Helm release 'argocd' outside Terraform state. Importing and retrying..."
              terraform import module.argocd.helm_release.argocd argocd/argocd
              terraform plan -out tfplan -input=false
              terraform apply -auto-approve tfplan
            else
              echo "Terraform apply failed and no known auto-recovery rule matched."
              exit "$apply_exit"
            fi
          fi

          rm -f "$plan_log"
          rm -f "$apply_log"
      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
      - name: Validate Argo CD deployment status
        run: |
          kubectl rollout status deployment/argocd-server -n argocd --timeout=300s
      - name: Validate Argo CD service is internal
        run: |
          service_type="$(kubectl -n argocd get svc argocd-server -o jsonpath='{.spec.type}')"
          test "$service_type" = "ClusterIP"
