apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "microservice.fullname" . }}
  labels:
{{ include "microservice.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
{{ include "microservice.labels" . | indent 6 }}
  template:
    metadata:
      labels:
{{ include "microservice.labels" . | indent 8 }}
{{- if .Values.podLabels }}
{{ toYaml .Values.podLabels | indent 8 }}
{{- end }}
      annotations:
{{ toYaml .Values.podAnnotations | indent 8 }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.otel.otlpEndpoint }}"
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | default (include "microservice.name" .) | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "{{ .Values.otel.resourceAttributes }}"
            - name: OTEL_TRACES_SAMPLER
              value: "{{ .Values.otel.tracesSampler }}"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "{{ .Values.otel.tracesSamplerArg }}"
{{- if .Values.extraEnv }}
{{ toYaml .Values.extraEnv | indent 12 }}
{{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
{{- if .Values.livenessProbe }}
          livenessProbe:
{{ toYaml .Values.livenessProbe | indent 12 }}
{{- end }}
{{- if .Values.readinessProbe }}
          readinessProbe:
{{ toYaml .Values.readinessProbe | indent 12 }}
{{- end }}
