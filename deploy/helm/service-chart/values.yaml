nameOverride: ""
fullnameOverride: ""

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""
  path: "/"
  hosts: []
  #  - host: chart-example.local
  #    paths:
  #      - path: /
  #        pathType: Prefix

podAnnotations: {}

podLabels: {}

livenessProbe: {}
#  httpGet:
#    path: /health
#    port: http
#  initialDelaySeconds: 30
#  periodSeconds: 10

readinessProbe: {}
#  httpGet:
#    path: /ready
#    port: http
#  initialDelaySeconds: 5
#  periodSeconds: 5

extraEnv: []

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

otel:
  enabled: true
  otlpEndpoint: "http://alloy.observability.svc.cluster.local:4318"
  serviceName: ""
  resourceAttributes: "service.namespace=default"
  tracesSampler: "parentbased_traceidratio"
  tracesSamplerArg: "0.1"
